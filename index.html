<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOTOBOY PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --surface: #1a1d24;
            --primary: #2299dd;
            --success: #00d26a;
            --danger: #f8312f;
            --text: #ffffff;
            --text-dim: #8b92a5;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text); 
        }
        
        /* TELAS */
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* TELA DE LOGIN */
        .login-box {
            padding: 40px 30px; text-align: center; max-width: 400px; margin: 40px auto;
        }
        .login-box h2 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .login-box p { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }
        .login-box input {
            width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px;
            box-sizing: border-box; font-family: 'Inter', sans-serif;
        }
        .login-box button {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none;
            border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer;
        }

        /* TELA DO APP */
        .header { background: var(--surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--primary); }
        .btn-logout { background: transparent; border: none; color: var(--text-dim); font-size: 20px; padding: 5px; cursor: pointer; }

        .status-bar { background: rgba(255,255,255,0.03); padding: 15px; text-align: center; font-size: 14px; font-weight: 600; color: #aaa; margin: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }

        .scanner-wrapper { position: relative; width: 100%; max-width: 280px; margin: 0 auto; display: none; overflow: hidden; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .scanner-container { width: 100%; border-radius: 20px; overflow: hidden; }
        
        .laser { position: absolute; width: 100%; height: 3px; background: #2299dd; z-index: 2; top: 50%; box-shadow: 0 0 15px 5px rgba(34, 153, 221, 0.5); animation: scan 2s infinite linear; display: none; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .controls { padding: 20px; display: flex; gap: 15px; justify-content: center; }
        .btn-toggle { background: var(--surface); color: var(--primary); border: 2px solid var(--primary); padding: 15px 25px; border-radius: 12px; font-weight: 800; font-size: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.2s; }

        .manual-input { margin: 0 20px 20px 20px; background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .manual-input p { margin: 0 0 10px 0; font-size: 13px; font-weight: 600; color: var(--text-dim); }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; color: #fff; font-family: 'Inter'; font-weight: 600; font-size: 16px; }
        .input-group button { background: var(--text-dim); color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        .orders-section { padding: 20px; padding-bottom: 100px; }
        .orders-title { font-size: 15px; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; color: var(--text-dim); }
        .badge { background: var(--primary); color: #fff; padding: 3px 8px; border-radius: 10px; font-size: 12px; }

        .order-card { background: var(--surface); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .order-info h3 { margin: 0 0 5px 0; font-size: 18px; color: #fff; }
        .order-info p { margin: 0 0 15px 0; font-size: 14px; color: var(--success); font-weight: 600; }
        
        .order-actions { display: flex; gap: 10px; }
        .order-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-view { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-return { background: rgba(248, 49, 47, 0.1); color: var(--danger); flex: 0.5 !important; }
        .btn-finish { background: var(--success); color: #fff; flex: 2 !important; }

        .toast { position: fixed; bottom: -100px; left: 20px; right: 20px; background: var(--success); color: white; padding: 15px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0, 210, 106, 0.3); transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        .order-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; margin-bottom: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .order-info h3 { margin: 0 0 5px 0; font-size: 16px; font-weight: 800; color: #fff; }
        .order-info p { margin: 0; font-size: 13px; color: #aaa; }
        .order-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; min-width: 80px; font-weight: 600; }
        .btn-return { background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        .btn-view { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        .btn-maps { background: #ea4335; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; min-width: 80px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px;}

        /* MODAL COM IFRAME */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--surface); border-radius: 20px; height: 100%; max-height: calc(100vh - 40px); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-header h2 { margin: 0; font-size: 18px; color: #fff; }
        .btn-close { background: rgba(255,255,255,0.1); border: none; color: white; width: 30px; height: 30px; border-radius: 15px; cursor: pointer; }
        .modal-body { flex: 1; overflow: hidden; background: #fff; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,210,106,0.3); }
    </style>
</head>
<body>
    
    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="screen">
        <div class="login-box">
            <div class="icon" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"><i class="fas fa-bolt"></i></div>
            <h2>MOTOBOY PRO</h2>
            <p>Acesse com seu CPF e senha da Hero.</p>
            <form id="loginForm">
                <input type="text" id="cpfInput" placeholder="Seu CPF (ex: 000.000.000-00)" required>
                <input type="password" id="passInput" placeholder="Sua Senha" required>
                <button type="submit" id="btnLogin">Entrar</button>
            </form>
            <p id="loginError" style="color: var(--danger); margin-top: 15px; display: none; font-weight: 600;"></p>
        </div>
    </div>

    <!-- TELA DO APP -->
    <div id="appScreen" class="screen">
        <div class="header">
            <h1>MOTOBOY PRO</h1>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        
        <div class="status-bar" id="statusMsg">
            Aponte a câmera para o QR Code
        </div>

        <div class="scanner-wrapper" id="scannerWrapper">
            <div id="reader"></div>
            <div class="laser" id="laserLine"></div>
        </div>

        <div style="padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin:0; font-size: 16px; color: #fff;">Pedidos Vinculados (<span id="orderCount">0</span>)</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="manualId" placeholder="ID Manual" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; padding: 8px; width: 100px;">
                    <button onclick="simulateScan()" style="background: var(--primary); color: white; border: none; border-radius: 8px; padding: 8px 15px; font-weight: 600; cursor: pointer;">IR</button>
                </div>
            </div>
            
            <div id="ordersList"></div>
        </div>
    </div>

    <!-- MODAL DO COMPROVANTE -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Pedido #...</h2>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        const API_BASE = window.location.origin;

        function getHeaders() {
            return {
                'x-hero-cpf': localStorage.getItem('hero_cpf'),
                'x-hero-password': localStorage.getItem('hero_password'),
                'Content-Type': 'application/json'
            };
        }

        // ======= LÓGICA DE TELAS E LOGIN =======
        window.onload = () => {
            if (localStorage.getItem('hero_cpf') && localStorage.getItem('hero_password')) {
                showApp();
            } else {
                document.getElementById('loginScreen').classList.add('active');
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cpf = document.getElementById('cpfInput').value;
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('loginError');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            err.style.display = 'none';

            try {
                const res = await fetch(API_BASE + '/api/auth/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf, password: pass })
                });

                if (res.ok) {
                    localStorage.setItem('hero_cpf', cpf);
                    localStorage.setItem('hero_password', pass);
                    showApp();
                } else {
                    const txt = await res.text();
                    err.innerText = txt;
                    err.style.display = 'block';
                }
            } catch (error) {
                err.innerText = "Erro de conexão com o servidor local.";
                err.style.display = 'block';
            }
            btn.innerHTML = 'Entrar';
        });

        function showApp() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('appScreen').classList.add('active');
            renderOrders();
            fetchActiveOrders();
            initScanner();
        }

        async function fetchActiveOrders() {
            setStatus('Sincronizando entregas ativas...', 'orange');
            try {
                const res = await fetch(API_BASE + '/api/ativos', { headers: getHeaders() });
                if (res.ok) {
                    const data = await res.json();
                    let updated = false;
                    data.pedidos.forEach(p => {
                        if (!orders.find(o => o.id === p.id)) {
                            orders.push({ id: p.id, total: p.total, endereco: p.endereco, status: 'active' });
                            updated = true;
                        }
                    });
                    if (updated) saveOrders();
                    renderOrders();
                    setStatus('Sincronizado! Aponte a câmera para ler QR Codes.', '#aaa');
                } else {
                    setStatus('Aponte a câmera para ler QR Codes.', '#aaa');
                }
            } catch (e) {
                setStatus('Aponte a câmera para ler QR Codes.', '#aaa');
            }
        }

        function logout() {
            localStorage.removeItem('hero_cpf');
            localStorage.removeItem('hero_password');
            window.location.reload();
        }

        // ======= LÓGICA DO SCANNER =======
        let isProcessing = false;
        
        function initScanner() {
            const html5QrcodeScanner = new Html5Qrcode("reader");
            
            const qrCodeSuccessCallback = (decodedText, decodedResult) => {
                if (isProcessing) return;
                processScan(decodedText);
            };

            const config = { fps: 10, qrbox: { width: 180, height: 180 } };
            document.getElementById('scannerWrapper').style.display = 'block';
            html5QrcodeScanner.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
                .catch(err => setStatus("Câmera não permitida ou indisponível.", "var(--danger)"));
        }

        function setStatus(msg, color) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.style.color = color;
            el.style.borderColor = color;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        // --- Gerenciamento de Pedidos LocalStorage ---
        let orders = JSON.parse(localStorage.getItem('hero_orders')) || [];
        
        function saveOrders() { localStorage.setItem('hero_orders', JSON.stringify(orders)); }

        function renderOrders() {
            document.getElementById('ordersList').innerHTML = '';
            orders.forEach(order => addOrderCard(order.id, order.total, order.status, order.endereco));
            document.getElementById('orderCount').innerText = orders.length;
        }

        async function processScan(url) {
            if (isProcessing) return;
            isProcessing = true;
            try {
                if(url.includes("login")) {
                    setStatus('Você escaneou o QR de login! Faça login manualmente.', 'orange');
                    return;
                }
                const parts = url.split('/');
                const pedidoId = parts[parts.length - 1];
                if (!pedidoId || isNaN(pedidoId)) throw new Error('ID Inválido');
                
                if (orders.find(o => o.id === pedidoId)) {
                    setStatus(`O Pedido #${pedidoId} já está na lista.`, 'var(--primary)');
                    return;
                }

                setStatus(`Vinculando Pedido #${pedidoId}...`, 'orange');
                document.getElementById('laserLine').style.background = '#2299dd';
                document.getElementById('laserLine').style.boxShadow = '0 0 15px 5px rgba(34, 153, 221, 0.5)';
                
                const res = await fetch(API_BASE + `/api/pegar/${pedidoId}`, { 
                    method: 'POST',
                    headers: getHeaders()
                });
                
                if (res.ok) {
                    const data = await res.json();
                    orders.push({ id: pedidoId, total: data.total, endereco: data.endereco, status: 'active' });
                    saveOrders();
                    renderOrders();
                    showToast(`Pedido #${pedidoId} vinculado!`);
                    setStatus('Aponte a câmera para o próximo pedido.', '#aaa');
                } else {
                    const txt = await res.text();
                    setStatus(`Erro ao pegar #${pedidoId}: ${txt}`, 'var(--danger)');
                }
            } catch (e) {
                setStatus('QR Code inválido ou erro de leitura', 'var(--danger)');
            }
            
            document.getElementById('laserLine').style.background = 'var(--success)';
            document.getElementById('laserLine').style.boxShadow = '0 0 15px 5px rgba(0, 210, 106, 0.5)';
            setTimeout(() => { isProcessing = false; }, 2000); 
        }

        async function finishOrder(pedidoId) {
            setStatus(`Finalizando Pedido #${pedidoId}...`, 'orange');
            try {
                const res = await fetch(API_BASE + `/api/finalizar/${pedidoId}`, { 
                    method: 'POST',
                    headers: getHeaders()
                });
                
                if (res.ok) {
                    const order = orders.find(o => o.id === pedidoId);
                    if (order) {
                        order.status = 'completed';
                        saveOrders();
                    }
                    showToast(`Entrega concluída!`);
                    renderOrders();
                    setStatus('Aponte a câmera para ler QR Codes.', '#aaa');
                } else {
                    const txt = await res.text();
                    setStatus(`Erro ao concluir #${pedidoId}: ${txt}`, 'var(--danger)');
                }
            } catch (e) {
                setStatus(`Erro de conexão ao finalizar #${pedidoId}`, 'var(--danger)');
            }
        }

        async function returnOrder(pedidoId) {
            if (!confirm(`Tem certeza que deseja DEVOLVER o pedido #${pedidoId}?`)) return;
            setStatus(`Devolvendo Pedido #${pedidoId}...`, 'var(--danger)');
            try {
                const res = await fetch(API_BASE + `/api/devolver/${pedidoId}`, { 
                    method: 'POST',
                    headers: getHeaders()
                });
                
                if (res.ok) {
                    orders = orders.filter(o => o.id !== pedidoId);
                    saveOrders();
                    renderOrders();
                    showToast(`Pedido devolvido!`);
                    setStatus('Aponte a câmera para ler QR Codes.', '#aaa');
                } else {
                    const txt = await res.text();
                    setStatus(`Erro ao devolver #${pedidoId}: ${txt}`, 'var(--danger)');
                }
            } catch (e) {
                setStatus(`Erro de conexão ao devolver #${pedidoId}`, 'var(--danger)');
            }
        }

        function openMaps(pedidoId) {
            const order = orders.find(o => o.id === pedidoId);
            if (!order || !order.endereco) return alert("Endereço não encontrado na nota.");
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(order.endereco)}`, '_blank');
        }

        async function viewReceipt(pedidoId) {
            document.getElementById('receiptModal').style.display = 'block';
            document.getElementById('modalTitle').innerText = `Pedido #${pedidoId}`;
            document.getElementById('modalBody').innerHTML = '<div style="padding: 30px; text-align: center;">Carregando...</div>';
            
            try {
                const res = await fetch(API_BASE + `/api/comprovante/${pedidoId}`, { headers: getHeaders() });
                if (res.ok) {
                    const html = await res.text();
                    const blob = new Blob([html], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('modalBody').innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none; background:#fff;"></iframe>`;
                } else {
                    document.getElementById('modalBody').innerHTML = `<div style="padding: 30px; color: red;">Erro ao carregar comprovante.</div>`;
                }
            } catch (e) {
                document.getElementById('modalBody').innerHTML = `<div style="padding: 30px; color: red;">Erro de conexão.</div>`;
            }
        }

        function closeModal() { 
            document.getElementById('receiptModal').style.display = 'none'; 
            document.getElementById('modalBody').innerHTML = '';
        }

        function addOrderCard(pedidoId, total, status, endereco) {
            const list = document.getElementById('ordersList');
            const card = document.createElement('div');
            card.className = 'order-card';
            if (status === 'completed') card.style.opacity = '0.6';
            card.id = `card-${pedidoId}`;
            
            card.innerHTML = `
                <div class="order-info" style="flex:1;">
                    <h3>Pedido #${pedidoId}</h3>
                    ${status === 'completed' 
                        ? '<p style="color:var(--success)"><i class="fas fa-check-double"></i> Concluído</p>' 
                        : '<p><i class="fas fa-check-circle"></i> Vinculado com sucesso</p>'}
                    ${total ? `<p style="font-weight:bold; font-size: 16px; margin-top:5px; color:#2299dd;">${total}</p>` : ''}
                    ${endereco && status !== 'completed' ? `<p style="font-size:12px; color:#aaa; margin-top:5px;"><i class="fas fa-map-marker-alt"></i> ${endereco.replace(/'/g, "")}</p>` : ''}
                </div>
                <div class="order-actions" style="flex:1; justify-content:flex-end;">
                    ${endereco && status !== 'completed' ? `<button class="btn-maps" onclick="openMaps('${pedidoId}')"><i class="fas fa-location-arrow"></i> Maps</button>` : ''}
                    ${status !== 'completed' ? `<button class="btn-finish" onclick="finishOrder('${pedidoId}')"><i class="fas fa-check-double"></i> Entregue</button>` : ''}
                    <button class="btn-view" onclick="viewReceipt('${pedidoId}')"><i class="fas fa-file-invoice"></i></button>
                    ${status !== 'completed' ? `<button class="btn-return" onclick="returnOrder('${pedidoId}')"><i class="fas fa-undo"></i></button>` : ''}
                </div>`;
            list.prepend(card);
        }

        function simulateScan() {
            const input = document.getElementById('manualId').value;
            if (input) {
                processScan(input);
                document.getElementById('manualId').value = '';
            }
        }
    </script>
</body>
</html>
